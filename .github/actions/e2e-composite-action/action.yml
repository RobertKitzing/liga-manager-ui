name: 'E2E'
description: "Cypress E2E Tests"
inputs:
  docker-repo-ui:
    required: true
  docker-repo-imgproxy:
    required: true
  cypress-record-key:
    required: true
runs:
  using: "composite"
  steps:
    - uses: actions/cache/restore@v4
      id: cache
      with:
        path: ./node_modules
        key: modules-${{ hashFiles('package-lock.json') }}
    - name: Download artifact
      uses: actions/download-artifact@v4.3.0
      with:
        name: lima-img
        path: /tmp
    - name: Load image
      shell: bash
      run: |
        docker load --input /tmp/lima.tar
    - name: Download artifact
      uses: actions/download-artifact@v4.3.0
      with:
        name: imgproxy-img
        path: /tmp
    - name: Load image
      shell: bash
      run: |
        docker load --input /tmp/imgproxy.tar
    - name: Start Services
      uses: hoverkraft-tech/compose-action@v2.6.0
      env:
        UI_IMAGE: ${{ inputs.docker-repo-ui }}
        IMGPROXY_IMAGE: ${{ inputs.docker-repo-imgproxy }}
        UI_TAG: 'e2e'
        API_TAG: 'latest'
      with:
        compose-file: "./docker-compose.e2e.yml"
    - name: Debug - Dump Container Logs
      shell: bash
      if: always()
      run: |
        echo "=== Container Status ==="
        docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.State}}"
        
        # Only dump logs for containers that are not running healthy
        docker ps -a --format "{{.Names}}\t{{.State}}\t{{.Status}}" | while IFS=$'\t' read -r name state status; do
          if [[ "$state" != "running" ]] || echo "$status" | grep -qi "unhealthy\|restarting"; then
            echo ""
            echo "=== Logs for $name (State: $state, Status: $status) ==="
            docker logs "$name" --tail 100 2>&1
          fi
        done
    - name: Cypress run
      uses: cypress-io/github-action@v6
      env:
        CYPRESS_RECORD_KEY: ${{ inputs.cypress-record-key }}
      with:
        command: npx nx-cloud record -- nx e2e liga-manager-ui-web --skip-nx-cache --config="baseUrl=http://localhost" --browser="chrome" --record --args="--parallel" --group chrome
    - name: Upload artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-videos-${{ matrix.container }}
        path: dist/cypress/apps/liga-manager-ui-web
    - name: Collect Container Logs
      shell: bash
      if: failure()
      run: |
        mkdir -p /tmp/container-logs
        docker ps -a --format "{{.Names}}" | while read -r name; do
          docker logs "$name" > "/tmp/container-logs/$name.log" 2>&1
        done
    - name: Upload Container Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: container-logs
        path: /tmp/container-logs/
        retention-days: 7